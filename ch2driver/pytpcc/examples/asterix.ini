# Local AsterixDB (Cluster Controller HTTP API, default port 19002).
# Usage: python tpcc.py asterix --config examples/asterix.ini --ch2pp ...
#
# Copy to my-asterix.ini if you want machine-specific paths without editing the repo copy.

[asterix]
cc_host = 127.0.0.1
cc_port = 19002
use_tls = false
dataverse = bench
analytical_query_subdir = asterix
statement_timeout_sec = 3600
# JSON output from --docgen-load (nestcollectionsdocgen or asterix driver)
output_dir = /tmp/ch2_data
join_hint =
